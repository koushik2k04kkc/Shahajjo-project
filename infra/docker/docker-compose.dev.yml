services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: mfs-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mfs_risk_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      # Runs once, alphabetically, ONLY on first start (empty data volume).
      - ../../server/5-data-layer/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mfs_risk_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mfs-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ../../server/2-api-gateway
      dockerfile: Dockerfile
    container_name: mfs-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=mfs_risk_platform
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ANALYTICS_URL=http://analytics-engine:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  analytics-engine:
    build:
      context: ../../server/3-analytics-engine
      dockerfile: Dockerfile
    container_name: mfs-analytics-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=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
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_NAME=mfs_risk_platform
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  timescaledb_data:
  redis_data:
